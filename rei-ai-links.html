<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>れいAI便利ツール｜リンクまとめ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-deep: #0a0e21;
    --navy-mid: #121a36;
    --violet: #7c6ff0;
    --blue: #4fa3f7;
    --lavender-text: #e9ebf9;
    --muted: #9aa0c4;
    --highlight: #ffd166;
    --card-bg: rgba(255,255,255,0.045);
    --card-border: rgba(255,255,255,0.10);
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  html,body{
    min-height:100%;
    background: var(--navy-deep);
  }

  body{
    font-family: 'Noto Sans JP', sans-serif;
    color: var(--lavender-text);
    display:flex;
    justify-content:center;
    overflow-x:hidden;
    position:relative;
    background:
      radial-gradient(ellipse 700px 500px at 15% -5%, rgba(124,111,240,0.35), transparent 60%),
      radial-gradient(ellipse 700px 600px at 90% 15%, rgba(79,163,247,0.28), transparent 55%),
      radial-gradient(ellipse 900px 700px at 50% 110%, rgba(124,111,240,0.20), transparent 60%),
      linear-gradient(180deg, var(--navy-deep) 0%, var(--navy-mid) 55%, var(--navy-deep) 100%);
  }

  /* ambient sparkle field */
  .sparkles{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:0;
  }
  .sparkle{
    position:absolute;
    color: rgba(255,255,255,0.55);
    font-size: 14px;
    opacity:0;
    animation: twinkle 4s ease-in-out infinite;
  }
  .sparkle.blue{ color: rgba(120,180,255,0.6); }
  .sparkle.violet{ color: rgba(180,150,255,0.6); }
  @keyframes twinkle{
    0%, 100% { opacity:0; transform: scale(0.6) rotate(0deg); }
    50% { opacity:1; transform: scale(1.1) rotate(15deg); }
  }

  .wrap{
    position:relative;
    z-index:1;
    width:100%;
    max-width: 480px;
    padding: 56px 24px 40px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  /* eyebrow badge */
  .badge{
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding: 6px 16px;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--violet), var(--blue));
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-weight:700;
    font-size: 13px;
    letter-spacing: 0.04em;
    color:#fff;
    box-shadow: 0 6px 20px rgba(124,111,240,0.35);
    margin-bottom: 22px;
    animation: fadeDown 0.7s ease both;
  }

  /* avatar with glow ring */
  .avatar-frame{
    position:relative;
    width: 148px;
    height: 148px;
    margin-bottom: 22px;
    animation: fadeUp 0.8s ease 0.1s both;
  }
  .avatar-ring{
    position:absolute;
    inset:-6px;
    border-radius:50%;
    background: conic-gradient(from 0deg, var(--violet), var(--blue), var(--highlight), var(--violet));
    filter: blur(0.5px);
    animation: spin 8s linear infinite;
  }
  .avatar-ring::after{
    content:"";
    position:absolute;
    inset:4px;
    border-radius:50%;
    background: var(--navy-deep);
  }
  .avatar-img{
    position:absolute;
    inset:6px;
    border-radius:50%;
    overflow:hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.45);
  }
  .avatar-img img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  @keyframes spin{
    to{ transform: rotate(360deg); }
  }

  h1{
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-weight:900;
    font-size: 34px;
    line-height:1.25;
    text-align:center;
    letter-spacing:0.01em;
    animation: fadeUp 0.8s ease 0.18s both;
  }
  h1 .ai{
    background: linear-gradient(90deg, var(--violet), var(--blue));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }

  .tagline{
    margin-top:10px;
    font-size:14.5px;
    color: var(--muted);
    text-align:center;
    animation: fadeUp 0.8s ease 0.24s both;
  }
  .tagline mark{
    background: linear-gradient(180deg, transparent 55%, rgba(255,209,102,0.55) 55%);
    color: var(--lavender-text);
    padding: 0 1px;
  }

  .bio{
    margin-top:18px;
    font-size:13.5px;
    line-height:1.9;
    color: var(--lavender-text);
    text-align:center;
    opacity:0.92;
    animation: fadeUp 0.8s ease 0.3s both;
  }

  /* category pills — mirrors the four content pillars */
  .pillars{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:8px;
    margin-top: 22px;
    animation: fadeUp 0.8s ease 0.36s both;
  }
  .pillar{
    display:flex;
    align-items:center;
    gap:6px;
    padding: 7px 13px;
    border-radius: 999px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    font-size: 12.5px;
    color: var(--lavender-text);
    backdrop-filter: blur(6px);
  }
  .pillar .dot{
    width:6px; height:6px;
    border-radius:50%;
    background: linear-gradient(135deg, var(--violet), var(--blue));
    flex-shrink:0;
  }

  .divider{
    width:100%;
    height:1px;
    margin: 32px 0 26px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.16), transparent);
  }

  /* link list */
  .links{
    width:100%;
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .link-card{
    position:relative;
    display:flex;
    align-items:center;
    gap:14px;
    width:100%;
    padding: 16px 18px;
    border-radius: 16px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    backdrop-filter: blur(10px);
    text-decoration:none;
    color: var(--lavender-text);
    overflow:hidden;
    isolation:isolate;
    transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
    animation: fadeUp 0.7s ease both;
  }
  .link-card:nth-of-type(1){ animation-delay: 0.42s; }
  .link-card:nth-of-type(2){ animation-delay: 0.48s; }
  .link-card:nth-of-type(3){ animation-delay: 0.54s; }

  .link-card::before{
    content:"";
    position:absolute;
    inset:0;
    z-index:-1;
    background: linear-gradient(120deg, rgba(124,111,240,0.22), rgba(79,163,247,0.16));
    opacity:0;
    transition: opacity 0.25s ease;
  }
  .link-card:hover, .link-card:focus-visible{
    transform: translateY(-3px);
    border-color: rgba(124,111,240,0.55);
    box-shadow: 0 12px 28px rgba(76,90,220,0.25);
  }
  .link-card:hover::before, .link-card:focus-visible::before{ opacity:1; }
  .link-card:focus-visible{ outline: 2px solid var(--blue); outline-offset:2px; }

  .link-icon{
    flex-shrink:0;
    width: 42px;
    height:42px;
    border-radius: 12px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:19px;
    background: linear-gradient(135deg, var(--violet), var(--blue));
    box-shadow: 0 4px 14px rgba(79,113,247,0.35);
  }
  .link-body{
    display:flex;
    flex-direction:column;
    gap:2px;
    flex:1;
    min-width:0;
  }
  .link-title{
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-weight:700;
    font-size: 15.5px;
  }
  .link-sub{
    font-size:12px;
    color: var(--muted);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .link-arrow{
    flex-shrink:0;
    color: var(--muted);
    font-size:16px;
    transition: transform 0.25s ease, color 0.25s ease;
  }
  .link-card:hover .link-arrow{
    transform: translateX(3px);
    color: var(--lavender-text);
  }

  footer{
    margin-top: 38px;
    text-align:center;
    font-size:11.5px;
    color: rgba(154,160,196,0.7);
    letter-spacing:0.02em;
    animation: fadeUp 0.8s ease 0.6s both;
  }
  footer .heart{ color: var(--highlight); }

  @keyframes fadeUp{
    from{ opacity:0; transform: translateY(14px); }
    to{ opacity:1; transform: translateY(0); }
  }
  @keyframes fadeDown{
    from{ opacity:0; transform: translateY(-10px); }
    to{ opacity:1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; }
    .avatar-ring{ animation:none; }
  }

  @media (max-width: 380px){
    h1{ font-size: 28px; }
    .wrap{ padding: 44px 18px 32px; }
  }
</style>
</head>
